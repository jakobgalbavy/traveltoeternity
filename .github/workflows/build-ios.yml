# ── Secrets needed when activating the deploy job ────────────────────────────
# (Android secrets reused for Unity build — see deploy-android.yml)
# IOS_CERTIFICATE_BASE64          — base64-encoded Distribution .p12 certificate
# IOS_CERTIFICATE_PASSWORD        — .p12 export password
# IOS_PROVISIONING_PROFILE_BASE64 — base64-encoded App Store provisioning profile
# IOS_PROVISIONING_PROFILE_NAME   — display name of the provisioning profile
# APP_STORE_CONNECT_API_KEY_ID    — 10-char key ID from App Store Connect
# APP_STORE_CONNECT_API_ISSUER_ID — UUID from App Store Connect → Keys
# APP_STORE_CONNECT_API_KEY_BASE64 — base64-encoded .p8 private key file
