name: Build & Upload iOS (Prep)

# Manual trigger only — Apple Developer account is being recovered.
# Wire up the deploy step once the account and certs are ready.
on:
  workflow_dispatch:

jobs:
  # ── Build (Unity → Xcode project) ────────────────────────────────────────────
  build:
    name: Build iOS Xcode project
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: game/Library
          key: Library-iOS-${{ hashFiles('game/Assets/**', 'game/Packages/**', 'game/ProjectSettings/**') }}
          restore-keys: |
            Library-iOS-
            Library-

      - name: Resolve version
        id: ver
        run: echo "name=0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build Unity iOS project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: game
          targetPlatform: iOS
          versioning: Custom
          version: ${{ steps.ver.outputs.name }}

      - name: Upload Xcode project artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-iOS-${{ github.run_number }}
          path: build/iOS
          retention-days: 7

